seed: 0
device: cpu
output_dir: outputs/rmd17_aspirin_tfn
dataset:
  name: rmd17
  molecule: aspirin
  path: data/rmd17/aspirin.npz
  train_size: 64
  val_size: 16
  test_size: 16
  cutoff_radius: 5.0
model:
  name: tfn
  hidden_dim: 96
  num_layers: 3
  radial_num_basis: 12
  radial_hidden_dim: 64
training:
  mode: direct_force
  batch_size: 4
  epochs: 5
  lr: 0.001
  weight_decay: 0.0001
  lambda_force: 1.0
  lambda_energy: 0.0
  gradient_clip: 1.0
