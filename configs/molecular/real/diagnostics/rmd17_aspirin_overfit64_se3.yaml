seed: 0
device: cpu
diagnostic_type: overfit
output_dir: outputs/rmd17_aspirin_overfit64_se3
dataset:
  name: rmd17
  molecule: aspirin
  path: data/rmd17/rmd17_aspirin.npz
  max_frames: 64
  train_size: 64
  val_size: 64
  test_size: 64
  cutoff_radius: 5.0
  split_type: train_only_overfit
model:
  name: se3_transformer
  lmax: 2
  channels_by_l:
    0: 96
  num_layers: 3
  radial_num_basis: 16
  radial_hidden_dim: 96
  output_head_init_scale: 1.0
training:
  mode: direct_force
  diagnostic_type: overfit
  diagnostic_logging: true
  batch_size: 32
  epochs: 160
  lr: 0.003
  weight_decay: 0.0
  force_loss_weight: 900.0
  energy_loss_weight: 0.0
  force_scale_normalization: train_force_rms
  force_loss_type: mse
  huber_delta: 1.0
  gradient_clip_norm: 10.0
