seed: 0
device: cpu
diagnostic_type: overfit_global_context_radial
output_dir: outputs/rmd17_aspirin_global_context_models_phase12/overfit32_global_context_radial
dataset:
  name: rmd17
  molecule: aspirin
  path: data/rmd17/rmd17_aspirin.npz
  max_frames: 32
  train_size: 32
  val_size: 32
  test_size: 32
  cutoff_radius: 5.0
  split_type: train_only_overfit
model:
  name: global_context_radial
  max_atoms: 32
  graph_mode: full
  hidden_dim: 256
  radial_num_basis: 32
  radial_hidden_dim: 384
  edge_mlp_hidden_dim: 512
  edge_mlp_layers: 4
  global_context_dim: 192
  global_hidden_dim: 512
  global_layers: 3
  atom_embedding_dim: 32
  pair_embedding_dim: 32
  use_atom_pair_embedding: true
  force_output_scale: 1.0
training:
  mode: direct_force
  diagnostic_type: equivariant_global_context_radial
  diagnostic_logging: true
  batch_size: 32
  epochs: 300
  lr: 0.003
  weight_decay: 0.0
  force_loss_weight: 1.0
  energy_loss_weight: 0.0
  force_scale_normalization: train_force_rms
  force_loss_type: mse
  huber_delta: 10.0
  gradient_clip_norm: 100.0
