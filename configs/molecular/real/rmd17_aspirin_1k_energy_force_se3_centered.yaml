seed: 0
device: cpu
output_dir: outputs/rmd17_aspirin_1k_energy_force_se3_centered
dataset:
  name: rmd17
  molecule: aspirin
  path: data/rmd17/rmd17_aspirin.npz
  max_frames: 1000
  train_size: 700
  val_size: 150
  test_size: 150
  cutoff_radius: 5.0
  split_type: chronological
model:
  name: se3_transformer
  lmax: 2
  channels_by_l:
    0: 64
  num_layers: 2
  radial_num_basis: 10
  radial_hidden_dim: 48
training:
  mode: energy_force
  batch_size: 4
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  force_loss_weight: 1.0
  energy_loss_weight: 0.1
  energy_centering: true
  energy_standardization: false
  energy_loss_on_centered: true
  gradient_clip: 1.0
  max_steps_per_epoch: 20
