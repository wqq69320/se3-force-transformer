seed: 0
device: cpu
diagnostic_type: random_ablation_global_coeff_no_prototype_memory
output_dir: outputs/rmd17_aspirin_global_context_ablation_phase13/global_coeff_no_prototype_memory
dataset:
  name: rmd17
  molecule: aspirin
  path: data/rmd17/rmd17_aspirin.npz
  max_frames: 1000
  train_size: 700
  val_size: 150
  test_size: 150
  cutoff_radius: 5.0
  split_type: random
model:
  name: global_coeff
  max_atoms: 32
  graph_mode: full
  hidden_dim: 512
  num_layers: 4
  global_context_dim: 256
  atom_embedding_dim: 32
  use_atom_pair_embedding: true
  pair_embedding_dim: 32
  radial_num_basis: 32
  edge_mlp_hidden_dim: 512
  edge_mlp_layers: 2
  force_output_scale: 1.0
  use_prototype_memory: false
  prototype_count: 0
  prototype_assignment: nearest
  prototype_coeff_init_scale: 0.0
training:
  mode: direct_force
  diagnostic_logging: true
  batch_size: 32
  epochs: 50
  lr: 0.001
  weight_decay: 0.0
  force_loss_weight: 1.0
  energy_loss_weight: 0.0
  force_scale_normalization: train_force_rms
  force_loss_type: mse
  huber_delta: 10.0
  gradient_clip_norm: 100.0
  max_steps_per_epoch: 8
  diagnostic_type: random_ablation_global_coeff_no_prototype_memory
