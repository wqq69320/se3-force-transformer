seed: 0
device: cpu
output_dir: outputs/scale_synthetic_n12
dataset:
  name: scale_synthetic
  molecule: synthetic_n12
  num_frames: 18
  num_atoms: 12
  train_size: 10
  val_size: 4
  test_size: 4
  cutoff_radius: 4.5
  sigma2: 1.4
  lambda_angle: 0.2
  seed: 0
model:
  name: se3_transformer
  lmax: 1
  channels_by_l:
    0: 32
  num_layers: 2
  radial_num_basis: 8
  radial_hidden_dim: 32
training:
  mode: direct_force
  batch_size: 2
  epochs: 1
  lr: 0.001
  weight_decay: 0.0001
  lambda_force: 1.0
  lambda_energy: 0.0
  gradient_clip: 1.0
  max_steps_per_epoch: 2
