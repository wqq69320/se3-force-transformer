seed: 17
device: cpu
output_dir: outputs/central_force_se3_l2
dataset:
  name: central
  num_samples: 48
  num_nodes: 6
  position_scale: 1.0
  mass_range: [0.5, 1.5]
  anisotropic: true
  seed: 17
model:
  name: se3_transformer
  scalar_input_dim: 1
  lmax: 2
  channels_by_l:
    0: 16
    1: 8
    2: 4
  num_layers: 3
  num_heads: 2
  num_query_channels: 8
  radial_num_basis: 12
  radial_hidden_dim: 48
  dropout: 0.0
  use_attention: true
  use_gate: true
training:
  batch_size: 6
  epochs: 2
  lr: 0.001
  weight_decay: 0.0001
  val_fraction: 0.2
  test_fraction: 0.2
  max_steps_per_epoch: 4
