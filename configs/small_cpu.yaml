seed: 7
device: cpu
output_dir: outputs/small_cpu
dataset:
  name: angular
  num_samples: 18
  num_nodes: 5
  position_scale: 1.0
  mass_range: [0.6, 1.4]
  lambda_angle: 0.25
  sigma2: 1.3
  sigma3: 1.6
  seed: 7
model:
  name: se3_transformer
  scalar_input_dim: 1
  lmax: 2
  channels_by_l:
    0: 8
    1: 4
    2: 2
  num_layers: 2
  num_heads: 2
  num_query_channels: 4
  radial_num_basis: 8
  radial_hidden_dim: 24
  dropout: 0.0
  use_attention: true
  use_gate: true
training:
  batch_size: 3
  epochs: 1
  lr: 0.001
  weight_decay: 0.0001
  val_fraction: 0.2
  test_fraction: 0.2
  max_steps_per_epoch: 2
